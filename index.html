<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sitios turísticos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #2c3e50; }
        nav { margin-bottom: 20px; }
        .sitios { display: flex; flex-wrap: wrap; gap: 20px; }
        .sitio { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px #ccc; width: 220px; }
        .asistente { margin-top: 40px; background: #e3eafc; padding: 20px; border-radius: 8px; }
        .asistente input, .asistente button { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Sitios turísticos</h1>
    <nav>
        <strong>Escoja los mejores sitios del mundo</strong>
    </nav>
    <div class="sitios" id="sitios"></div>

    <div class="asistente">
        <h2>Asistente Virtual</h2>
        <p>Preguntas disponibles:</p>
        <ul>
            <li>¿Cuál es el sitio más económico?</li>
            <li>¿Cuál es el sitio más recomendado?</li>
            <li>¿Qué otros sitios recomiendan?</li>
        </ul>
        <input type="text" id="pregunta" placeholder="Escribe tu pregunta aquí..." size="40">
        <button onclick="responder()">Preguntar</button>
        <div id="respuesta" style="margin-top:15px; color:#2c3e50;"></div>
    </div>

    <script>
        // Dataset de 20 sitios turísticos
        const sitios = [
            { nombre: "Machu Picchu", pais: "Perú", precio: 120, recomendado: true },
            { nombre: "Gran Muralla China", pais: "China", precio: 80, recomendado: true },
            { nombre: "Taj Mahal", pais: "India", precio: 60, recomendado: true },
            { nombre: "Torre Eiffel", pais: "Francia", precio: 50, recomendado: true },
            { nombre: "Coliseo Romano", pais: "Italia", precio: 70, recomendado: true },
            { nombre: "Chichen Itzá", pais: "México", precio: 40, recomendado: false },
            { nombre: "Cristo Redentor", pais: "Brasil", precio: 35, recomendado: false },
            { nombre: "Petra", pais: "Jordania", precio: 90, recomendado: true },
            { nombre: "Monte Fuji", pais: "Japón", precio: 55, recomendado: false },
            { nombre: "Santorini", pais: "Grecia", precio: 100, recomendado: false },
            { nombre: "Islas Maldivas", pais: "Maldivas", precio: 300, recomendado: false },
            { nombre: "Parque Yellowstone", pais: "EEUU", precio: 30, recomendado: false },
            { nombre: "Angkor Wat", pais: "Camboya", precio: 45, recomendado: false },
            { nombre: "Sagrada Familia", pais: "España", precio: 25, recomendado: false },
            { nombre: "Stonehenge", pais: "Reino Unido", precio: 20, recomendado: false },
            { nombre: "Monte Kilimanjaro", pais: "Tanzania", precio: 150, recomendado: false },
            { nombre: "Sydney Opera House", pais: "Australia", precio: 65, recomendado: false },
            { nombre: "Niágara Falls", pais: "Canadá", precio: 40, recomendado: false },
            { nombre: "Safari en Kenia", pais: "Kenia", precio: 200, recomendado: false },
            { nombre: "Islas Galápagos", pais: "Ecuador", precio: 250, recomendado: false }
        ];

        // Mostrar sitios en la página
        const sitios Div = document.getElementById('sitios');
        sitios.forEach ( sitio => {
            sitiosDiv.innerHTML += `
                <div class="sitio">
                    <strong>${sitio.nombre}</strong><br>
                    País: ${sitio.pais}<br>
                    Precio: $${sitio.precio} USD<br>
                    ${sitio.recomendado ? '<span style="color:green;">★ Recomendado</span>' : ''}
                </div>
            `;
        });

        // Asistente virtual
        function responder() {
            const pregunta = document.getElementById('pregunta').value.toLowerCase();
            let respuesta = "";

            if (pregunta.includes("económico")) {
                const masBarato = sitios.reduce((prev, curr) => prev.precio < curr.precio ? prev : curr);
                respuesta = `El sitio más económico es <strong>${masBarato.nombre}</strong> (${masBarato.pais}) con un precio de $${masBarato.precio} USD.`;
            } else if (pregunta.includes("recomendado")) {
                const recomendado = sitios.find(s => s.recomendado);
                respuesta = `El sitio más recomendado es <strong>${recomendado.nombre}</strong> (${recomendado.pais}).`;
            } else if (pregunta.includes("otros sitios")) {
                const otros = sitios.filter(s => !s.recomendado).slice(0, 3).map(s => s.nombre).join(", ");
                respuesta = `Otros sitios que recomendamos: ${otros}.`;
            } else {
                respuesta = "Por favor, realiza una de las preguntas sugeridas.";
            }
            document.getElementById('respuesta').innerHTML = respuesta;
        }
    </script>
</body>
</html>
